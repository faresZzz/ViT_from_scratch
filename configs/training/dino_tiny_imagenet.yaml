approach: dino
dataset: tiny-imagenet
data_dir: data
output_dir: runs
epochs: 150
batch_size: 64
lr: 1.0e-4
weight_decay: 5.0e-2
optimizer: adamw
optimizer_betas: [0.9, 0.999]
momentum: 0.9
image_size: 64
patch_size: 8
embed_dim: 192
depth: 6
num_heads: 6
mlp_ratio: 4.0
dropout: 0.0
attention_dropout: 0.0
label_smoothing: 0.0
color_jitter_strength: 0.15
random_erasing_prob: 0.0
randaugment_num_ops: 0
randaugment_magnitude: 5
position_embedding: learned
device: auto
seed: 42
num_workers: 0
checkpoint_keep_last: 3
save_every: 1
scheduler: cosine
warmup_epochs: 20
min_lr: 1.0e-5
val_fraction: 0.1
split_train_validation: true
show_progress: true
dino_momentum: 0.996
student_temperature: 0.1
teacher_temperature: 0.04
teacher_global_crops: 2
student_global_crops: 2
student_local_crops: 4
teacher_global_crop_scale_min: 0.4
teacher_global_crop_scale_max: 1.0
student_global_crop_scale_min: 0.4
student_global_crop_scale_max: 1.0
student_local_crop_scale_min: 0.05
student_local_crop_scale_max: 0.4
dino_view_noise_std: 0.01

clip_grad_norm: 3.0
eval_knn_every: 10
