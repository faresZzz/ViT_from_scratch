approach: classification
dataset: cifar10
data_dir: data
output_dir: runs
epochs: 100
batch_size: 128
lr: 3.0e-4
weight_decay: 1.0e-4
optimizer: adamw
optimizer_betas: [0.9, 0.999]
momentum: 0.9
image_size: 32
patch_size: 4
embed_dim: 128
depth: 4
num_heads: 4
mlp_ratio: 4.0
dropout: 0.1
attention_dropout: 0.1
label_smoothing: 0.05
color_jitter_strength: 0.2
random_erasing_prob: 0.1
randaugment_num_ops: 2
randaugment_magnitude: 9
position_embedding: learned
device: auto
seed: 42
num_workers: 0
checkpoint_keep_last: 3
save_every: 1
scheduler: cosine
warmup_epochs: 5
min_lr: 1.0e-5
val_fraction: 0.1
split_train_validation: true
show_progress: true
